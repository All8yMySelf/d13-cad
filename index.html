<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D13-CAD — Parametric Dummy 13 Editor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="top-bar">
    <div class="top-left">
      <div class="logo-block">
        <span class="logo-t">T</span><span class="logo-i">I</span><span class="logo-n">N</span><span class="logo-k">K</span><span class="logo-e">E</span><span class="logo-r">R</span><span class="logo-c">C</span><span class="logo-a">A</span><span class="logo-d">D</span>
      </div>
      <div class="project-name" contenteditable="true">Untitled Design</div>
    </div>
    <div class="top-center">
      <button class="tb-btn" id="btn-undo" title="Undo">↶</button>
      <button class="tb-btn" id="btn-redo" title="Redo">↷</button>
      <div class="tb-sep"></div>
      <button class="tb-btn active" id="btn-select" title="Select">🖱️</button>
      <button class="tb-btn" id="btn-move" title="Move">↔</button>
      <button class="tb-btn" id="btn-rotate" title="Rotate">↻</button>
      <button class="tb-btn" id="btn-scale" title="Scale">⤢</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-align" title="Align">⊞</button>
      <button class="tb-btn" id="btn-group" title="Group">⧉</button>
      <button class="tb-btn" id="btn-mirror" title="Mirror">⇄</button>
    </div>
    <div class="top-right">
      <button class="tb-btn" id="btn-import">Import</button>
      <button class="tb-btn" id="btn-export">Export</button>
      <button class="tb-btn accent" id="btn-send">Send To</button>
      <button class="tb-btn icon" id="btn-user">👤</button>
    </div>
  </header>

  <div class="workspace">
    <aside class="left-bar">
      <div class="view-cube" id="view-cube">
        <div class="vc-face vc-top" data-view="top">TOP</div>
        <div class="vc-face vc-front" data-view="front">FRONT</div>
      </div>
      <div class="left-tools">
        <button class="lt-btn" id="btn-home" title="Home View">🏠</button>
        <button class="lt-btn" id="btn-zoom-in" title="Zoom In">+</button>
        <button class="lt-btn" id="btn-zoom-out" title="Zoom Out">−</button>
        <button class="lt-btn" id="btn-fit" title="Fit View">⊡</button>
      </div>
    </aside>

    <main class="canvas-wrap" id="canvas-wrap">
      <div class="workplane-label">Workplane</div>
      <div class="grid-label" id="grid-label">Millimeters</div>
    </main>

    <aside class="right-panel" id="right-panel">
      <div class="panel-header">
        <span class="panel-title">Basic Shapes</span>
        <button class="ph-btn" id="btn-panel-menu">⋮</button>
        <button class="ph-btn" id="btn-panel-search">🔍</button>
      </div>
      <div class="shape-grid" id="shape-grid"></div>
      <div class="panel-tabs">
        <button class="tab-btn active" data-tab="basic">Basic Shapes</button>
        <button class="tab-btn" data-tab="dummy13">Dummy 13</button>
      </div>
      <button class="more-shapes" id="btn-more-shapes">More Shapes</button>
    </aside>
  </div>

  <footer class="bottom-bar">
    <div class="bottom-left">
      <button class="bt-btn" id="btn-settings">⚙️ Settings</button>
    </div>
    <div class="bottom-center">
      <label>Snap Grid</label>
      <select id="snap-grid">
        <option value="0.1">0.1 mm</option>
        <option value="0.5">0.5 mm</option>
        <option value="1" selected>1.0 mm</option>
        <option value="5">5 mm</option>
        <option value="10">10 mm</option>
      </select>
    </div>
    <div class="bottom-right">
      <button class="bt-btn" id="btn-screenshot">📷 Screenshot</button>
    </div>
  </footer>

  <div class="props-panel" id="props-panel" style="display:none;">
    <div class="pp-header">
      <span id="pp-title">Box</span>
      <button class="pp-close" id="pp-close">✕</button>
    </div>
    <div class="pp-body">
      <div class="pp-row"><label>L</label><input type="number" id="pp-len" step="0.1"><span class="unit">mm</span></div>
      <div class="pp-row"><label>W</label><input type="number" id="pp-wid" step="0.1"><span class="unit">mm</span></div>
      <div class="pp-row"><label>H</label><input type="number" id="pp-hei" step="0.1"><span class="unit">mm</span></div>
      <div class="pp-row"><label>X</label><input type="number" id="pp-x" step="0.1"><span class="unit">mm</span></div>
      <div class="pp-row"><label>Y</label><input type="number" id="pp-y" step="0.1"><span class="unit">mm</span></div>
      <div class="pp-row"><label>Z</label><input type="number" id="pp-z" step="0.1"><span class="unit">mm</span></div>
      <div class="pp-row color-row">
        <label>Color</label>
        <div class="color-presets" id="color-presets"></div>
      </div>
      <div class="pp-row">
        <button class="pp-action" id="pp-duplicate">Duplicate</button>
        <button class="pp-action danger" id="pp-delete">Delete</button>
      </div>
    </div>
  </div>

  <div class="snap-hint" id="snap-hint"></div>

  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <p>Loading D13-CAD...</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
